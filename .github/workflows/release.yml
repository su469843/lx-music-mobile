name: Build Android App

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: List directory structure
        run: |
          echo "Root directory:"
          ls -la
          echo "Android directory:"
          ls -la android/
          echo "Android app directory:"
          ls -la android/app/

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Create keystore directory and properties
        run: |
          mkdir -p android/app/keystore
          echo "storeFile=keystore/${{ secrets.KEYSTORE_STORE_FILE }}" > android/keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/keystore.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> android/keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> android/keystore.properties
        
      - name: Build Packages
        shell: bash
        run: |
          cd android
          chmod +x ./gradlew
          echo ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }} | base64 --decode > app/keystore/${{ secrets.KEYSTORE_STORE_FILE }}
          ./gradlew assembleRelease
          rm -f app/keystore/${{ secrets.KEYSTORE_STORE_FILE }}

      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version") || exit 1
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_ENV

      - name: Generate file MD5
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk > md5.txt
          echo "### MD5 校验" >> $GITHUB_STEP_SUMMARY
          cat md5.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifact
        uses: ./.github/actions/upload-artifact
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body_path: ./publish/changeLog.md
          files: |
            artifacts/lx-music-mobile-v${{ env.PACKAGE_VERSION }}-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
